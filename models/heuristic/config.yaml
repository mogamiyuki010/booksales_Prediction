# GEM 智能圖書印量預估模型 - 校準參數設定檔
# 版本: v1.0 (改進版)
# 校準來源: 6 個 2024-2025 案例 (陳重銘, 艾蜜莉2.0, 陳威良, 朱家泓, 莎拉王, 林穎)
# 更新日期: 2026-04-10

model:
  name: "GEM v1.0"
  description: "三層疊代預測法 - 改進版（含修正係數與月度軌跡建模）"

# ============================================================
# 作者類型定義
# ============================================================
author_types:
  KOP:
    label: "頂級 KOP/長銷王"
    description: "權威性高，知識系統強，多媒體整合。穩定、持久、衰退慢。"
    examples: ["陳重銘", "朱家泓"]

  KOC:
    label: "社群 KOC/速爆型"
    description: "流量高，主題熱門，高度依賴社群推廣。初期爆發力強，長尾衰退快。"
    examples: ["莎拉王", "陳威良"]

  Co-Branding:
    label: "Co-Branding/系統繼承"
    description: "繼承導師品牌，銷量穩健，長銷性強。銷量集中度高。"
    examples: ["林穎 (導師: 朱家泓)"]

  Debut:
    label: "新人作者"
    description: "無既有受眾，預測依賴主題熱度與出版社行銷力度。"
    examples: []

# ============================================================
# 轉換率 (Conversion Rate) 參數
# ============================================================
conversion_rates:
  # 內層受眾: 鐵粉/付費學員
  inner:
    min: 0.80
    max: 1.00
    note: "主要貢獻初期爆發量"

  # 中層受眾: 活躍粉絲
  # v1.0 修正: 從 3%-8% 下修至 1.5%-4%
  # 原因: 結合衰退模型後，原 CR 導致系統性高估
  middle:
    min: 0.015
    max: 0.04
    note: "v1.0 修正: 原 3%-8% 下修至 1.5%-4%，降低系統性高估"

  # 外層受眾: 潛在讀者/通路曝光
  outer:
    min: 0.003
    max: 0.01
    note: "通路曝光接觸者"

  # 安全下限 (陳重銘案例驗證)
  safety_floor: 0.041

# ============================================================
# 衰退率 (Decay Rate) 參數
# 月度衰退: sales_month_t = peak × (1 - decay_rate)^(t-1)
# ============================================================
decay_rates:
  KOP:
    monthly_decay: 0.20
    description: "月均銷量衰退 20%，長銷生命週期最長"
    half_life_months: 3.1  # ln(0.5)/ln(0.8) ≈ 3.1 個月

  KOC:
    monthly_decay: 0.45
    description: "月銷量迅速跌落，初始爆發後極端衰退"
    half_life_months: 1.2  # ln(0.5)/ln(0.55) ≈ 1.2 個月

  Co-Branding:
    monthly_decay: 0.35
    description: "中度衰退，長尾穩定性優於 KOC 但不及導師親著"
    half_life_months: 1.6  # ln(0.5)/ln(0.65) ≈ 1.6 個月

  Debut:
    monthly_decay: 0.40
    description: "預設衰退率，介於 KOC 與 Co-Branding 之間"
    half_life_months: 1.4

# ============================================================
# 系統性修正係數
# v1.0 新增: 對 N_Committed 施加修正，降低高估偏差
# ============================================================
correction_factors:
  # 整體修正因子: 校正模型系統性高估
  global_deflation:
    min: 0.55
    max: 0.65
    default: 0.60
    note: "基於 6 案例回測，原模型中位數高估 ~45%，此因子修正偏差"

  # 續作折扣因子
  sequel_discount: 0.70
  note_sequel: "續作長尾極短 (艾蜜莉2.0案例)，額外打 70%"

  # 高價書修正
  high_price_threshold: 600  # NT$
  high_price_bonus: 1.10
  note_price: "朱家泓案例: 高單價(NT$820)讀者忠誠度更高，可突破天花板"

  # 第 N 本書遞減因子
  nth_book_decay: 0.90
  note_nth: "每多出一本書，預期銷量乘以 0.9 (第2本=0.9x, 第3本=0.81x)"

# ============================================================
# 趨勢乘數 (Trend Multiplier)
# ============================================================
trend_multiplier:
  KOP: 1.15       # 知識系統長銷
  KOC: 1.25       # 高熱度但快速衰退
  Co-Branding: 1.20
  Debut: 1.10     # 保守

# ============================================================
# 通路最低鋪貨量
# ============================================================
distribution:
  minimum_stock: 500  # 基本通路鋪貨量

# ============================================================
# 首印量決策邏輯
# ============================================================
print_run:
  # 首印量 = 預估前 3 個月銷量 (保守策略)
  target_months: 3
  # Co-Branding 安全線: 導師歷史銷量的 60%-70%
  cobranding_mentor_ratio:
    min: 0.60
    max: 0.70

# ============================================================
# 預測目標
# ============================================================
forecast_targets:
  primary: "6_months"    # 主要預測: 首 6 個月銷量
  secondary: "12_months" # 次要預測: 首年銷量
  print_run: "3_months"  # 首印量: 基於前 3 個月預估

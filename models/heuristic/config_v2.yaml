# GEM 智能圖書印量預估模型 - 校準參數設定檔
# 版本: v2.0 (真實資料校準版)
# 校準來源: 營收表 Raw Data (2008-2026), 87 本紙本書 + 31 本電子書實際月度銷售曲線
# 更新日期: 2026-04-10
# 變更摘要:
#   - 月衰退率全面依真實曲線重新校準
#   - 新增電子書獨立預測通道 (ebook_ratio)
#   - 新增「新書首月爆發量」直接估算法 (取代純受眾轉換)
#   - 修正 global_deflation 至實際水位

model:
  name: "GEM v2.0"
  description: "三層疊代預測法 + 真實資料校準 (含紙本書/電子書雙通道)"

# ============================================================
# 作者類型定義 (同 v1.0)
# ============================================================
author_types:
  KOP:
    label: "頂級 KOP/長銷王"
    description: "權威性高，知識系統強。首月爆發中等，但長銷性極佳。"
    examples: ["陳重銘", "朱家泓"]
    calibration_books: 8
    calibration_note: "基於陳重銘6本、朱家泓2本真實銷售數據"

  KOC:
    label: "社群 KOC/速爆型"
    description: "流量高，初期爆發強，長尾衰退快。"
    examples: ["莎拉王", "陳威良", "艾蜜莉", "楊禮軒", "蕭啟斌", "權證小哥"]
    calibration_books: 6
    calibration_note: "基於艾蜜莉、莎拉王、楊禮軒、蕭啟斌、權證小哥、陳威良真實數據"

  Co-Branding:
    label: "Co-Branding/系統繼承"
    description: "繼承導師品牌，首月爆發低於導師，但長銷穩健。"
    examples: ["林穎 (導師: 朱家泓)"]
    calibration_books: 1
    calibration_note: "基於林穎《學會走圖SOP》真實數據"

  Debut:
    label: "新人作者"
    description: "無既有受眾，預測依賴主題熱度。"
    examples: ["秦嗣林"]
    calibration_books: 1
    calibration_note: "基於秦嗣林《人生流當品》真實數據"

# ============================================================
# 轉換率 (Conversion Rate) 參數
# v2.0: 維持框架，但降低 middle 和 outer CR
# 原因: 真實數據顯示 v1.0 的 CR 仍然偏高
# ============================================================
conversion_rates:
  inner:
    min: 0.80
    max: 1.00
    note: "付費學員轉換率，維持 v1.0"

  # v2.0: 從 1.5%-4% 下修至 1.0%-2.5%
  # 根據: KOP 12月累計 ~15,000 vs 社群粉絲 50萬+，實際中層 CR 約 1.5%
  middle:
    min: 0.010
    max: 0.025
    note: "v2.0: 從 1.5%-4% 下修至 1.0%-2.5%，真實 CR 更低"

  outer:
    min: 0.002
    max: 0.006
    note: "v2.0: 從 0.3%-1.0% 下修至 0.2%-0.6%"

  safety_floor: 0.041

# ============================================================
# 衰退率 (Decay Rate) - v2.0 真實資料校準
# 基於 118 本書實際月度銷售曲線擬合
# ============================================================
decay_rates:
  KOP:
    # v1.0: 0.20 → v2.0: 0.18
    # 真實數據: KOP 大書衰退率 0.12-0.37，中位 ~0.18
    # 陳重銘平均: 0.19, 朱家泓: 0.22, 加權中位: 0.18
    monthly_decay: 0.18
    description: "月銷量衰退 18%，長銷型。校準依據: 8 本 KOP 書實際曲線"
    half_life_months: 3.5

  KOC:
    # v1.0: 0.45 → v2.0: 0.35
    # 真實數據: KOC 中位衰退率 0.328
    # 艾蜜莉: 0.37, 莎拉王: 0.45, 楊禮軒: 0.43, 蕭啟斌: 0.13, 權證小哥: 0.33
    # 排除極端值(蕭啟斌)後中位: 0.37 → 取 0.35 為保守估計
    monthly_decay: 0.35
    description: "月銷量衰退 35%，初期爆發後快速下降。校準依據: 6 本 KOC 書"
    half_life_months: 1.6

  Co-Branding:
    # v1.0: 0.35 → v2.0: 0.22
    # 真實數據: 林穎 0.213
    # Co-Branding 書衰退比 KOC 慢，接近 KOP
    monthly_decay: 0.22
    description: "月銷量衰退 22%，繼承導師品牌穩健。校準依據: 林穎實際曲線"
    half_life_months: 2.8

  Debut:
    # v1.0: 0.40 → v2.0: 0.30
    # 真實數據: 秦嗣林 0.292, Other 類中位 0.361
    monthly_decay: 0.30
    description: "月銷量衰退 30%。校準依據: 新人作者平均曲線"
    half_life_months: 2.0

# ============================================================
# 系統性修正係數 - v2.0 重新校準
# ============================================================
correction_factors:
  # v2.0: 收緊 deflation (因為 CR 已經下修)
  # 原理: CR 下修 + deflation 收緊 = 雙重校正
  global_deflation:
    min: 0.65
    max: 0.80
    default: 0.72
    note: "v2.0: 從 0.55-0.65 上調至 0.65-0.80，因 CR 已下修"

  sequel_discount: 0.70
  note_sequel: "續作折扣維持 0.70"

  high_price_threshold: 600
  high_price_bonus: 1.10
  note_price: "高價書加成維持 1.10"

  nth_book_decay: 0.92
  note_nth: "v2.0: 從 0.90 上調至 0.92。陳重銘第5-8本仍維持 10,000+ 銷量"

# ============================================================
# 趨勢乘數 - v2.0 基於真實數據微調
# ============================================================
trend_multiplier:
  KOP: 1.10       # v1.0: 1.15 → 下修，KOP 長銷但非持續上升
  KOC: 1.20       # v1.0: 1.25 → 下修
  Co-Branding: 1.15  # v1.0: 1.20 → 下修
  Debut: 1.08     # v1.0: 1.10 → 下修

# ============================================================
# 通路最低鋪貨量
# ============================================================
distribution:
  minimum_stock: 500

# ============================================================
# 首印量決策邏輯
# ============================================================
print_run:
  target_months: 3
  cobranding_mentor_ratio:
    min: 0.60
    max: 0.70

# ============================================================
# v2.0 新增: 電子書預測通道
# 基於 36 組紙本/電子同書比較數據
# ============================================================
ebook_channel:
  # 電子書銷量 = 紙本書預測 × ebook_ratio
  ebook_ratio:
    KOP:
      min: 0.05
      max: 0.08
      note: "陳重銘 5.6%, 朱家泓 4.6%"
    KOC:
      min: 0.10
      max: 0.18
      note: "艾蜜莉 15%, 莎拉王 9.4%, 楊禮軒 12.1%, 權證小哥 13.1%"
    Co-Branding:
      min: 0.08
      max: 0.12
      note: "林穎 10.6%"
    Debut:
      min: 0.08
      max: 0.15
      note: "秦嗣林 6.7%, 其他新人 15-20%"

  # 電子書衰退率遠低於紙本
  decay_rates:
    KOP:
      monthly_decay: 0.05
      note: "電子書幾乎無衰退，長期穩定銷售"
    KOC:
      monthly_decay: 0.15
      note: "電子書衰退約紙本的 40%"
    Co-Branding:
      monthly_decay: 0.10
    Debut:
      monthly_decay: 0.12

# ============================================================
# v2.0 新增: 首月爆發量直接估算法
# 基於真實資料的首月銷量分佈
# 用途: 作為 CR 計算法的交叉驗證
# ============================================================
first_month_benchmarks:
  KOP:
    # 陳重銘大書首月: 3,862~9,907, 中位 ~5,500
    # 朱家泓大書首月: 3,951
    median: 5000
    range: [3500, 10000]
    note: "KOP 首月中位 5,000，視社群規模調整"

  KOC:
    # 艾蜜莉: 6,371, 莎拉王: 6,107, 楊禮軒: 7,365, 蕭啟斌: 4,299, 權證小哥: 4,683
    median: 5500
    range: [3000, 8000]
    note: "KOC 首月爆發力與 KOP 接近，但後續衰退快"

  Co-Branding:
    # 林穎: 2,032
    median: 2000
    range: [1500, 3000]
    note: "Co-Branding 首月明顯低於導師"

  Debut:
    # 秦嗣林: 3,207, 其他新人: 750~2,600
    median: 1500
    range: [750, 3000]
    note: "新人首月差異大，取保守估計"

# ============================================================
# 預測目標
# ============================================================
forecast_targets:
  primary: "6_months"
  secondary: "12_months"
  print_run: "3_months"

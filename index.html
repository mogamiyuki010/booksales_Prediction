<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金尉出版社 - 圖書銷量預測系統 v2.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(160deg, #faf6ed 0%, #f5f0e3 40%, #f0e8d4 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .container { text-align: center; padding: 40px; }
  h1 {
    font-size: 32px; font-weight: 800; margin-bottom: 8px;
    background: linear-gradient(135deg, #b8860b, #d4a517);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sub { color: #5c4a2a; font-size: 14px; margin-bottom: 48px; }
  .cards { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; }
  a.card {
    display: block; width: 320px; padding: 36px 28px; border-radius: 16px;
    background: white; box-shadow: 0 4px 16px rgba(58,46,26,.10);
    border: 1px solid rgba(184,134,11,.12); text-decoration: none;
    transition: all .25s;
  }
  a.card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(58,46,26,.16); border-color: #b8860b; }
  .card .icon { font-size: 40px; margin-bottom: 16px; }
  .card h2 { font-size: 18px; color: #3a2e1a; margin-bottom: 8px; }
  .card p { font-size: 14px; color: #9e8e6e; line-height: 1.6; }
  .footer { margin-top: 48px; font-size: 12px; color: #9e8e6e; }
</style>
</head>
<body>
<div class="container">
  <h1>金尉出版社</h1>
  <div class="sub">圖書銷量預測系統 v2.0</div>
  <div class="cards">
    <a class="card" href="dashboard.html">
      <div class="icon">&#128202;</div>
      <h2>圖書銷量預測模型 v2.0</h2>
      <p>數據分析儀表板<br>月度趨勢 / 年度 TOP5 / 衰退曲線 / 模型回測</p>
    </a>
    <a class="card" href="predictor.html">
      <div class="icon">&#128300;</div>
      <h2>新書銷量預測工具 v2.0</h2>
      <p>互動式預測工具<br>輸入作者與書籍資料，即時獲得銷量預測</p>
    </a>
  </div>
  <div class="footer">GEM v2.0 Three-Layer Prediction Model</div>
</div>
</body>
</html>
